name: Build and Package Python App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            output_name: netleaf
          - os: macos-latest
            output_name: Netleaf.app
          - os: windows-latest
            output_name: Netleaf.exe

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Extract version from folder name
      run: |
        APP_FOLDER=$(ls -d Netleaf*)
        APP_VERSION=$(echo $APP_FOLDER | sed 's/Netleaf v//')
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "APP_FOLDER=$APP_FOLDER" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Create version file
      run: echo "${{ env.APP_VERSION }}" > version.txt

    - name: Build with PyInstaller
      run: pyinstaller --onefile --add-data "version.txt:." --name "Netleaf" "${{ env.APP_FOLDER }}/main.py"

    - name: Package for Windows
      if: matrix.os == 'windows-latest'
      run: |
        Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "wix311-binaries.zip"
        Expand-Archive -Path "wix311-binaries.zip" -DestinationPath "wix311"
        $env:PATH += ";$pwd\wix311"
        heat dir "dist\Netleaf" -cg AppFiles -dr INSTALLDIR -out app.wxs
        candle app.wxs -out app.wixobj
        light app.wixobj -out "dist\Netleaf-${{ env.APP_VERSION }}-win64.msi"

    - name: Package for macOS
      if: matrix.os == 'macos-latest'
      run: |
        hdiutil create -volname "Netleaf" -srcfolder "dist/${{ matrix.output_name }}" -ov -format UDZO "dist/Netleaf-${{ env.APP_VERSION }}-macos.dmg"

    - name: Package for Linux (deb)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby-dev build-essential
        sudo gem install fpm
        fpm -s dir -t deb -n "Netleaf" -v "${{ env.APP_VERSION }}" "./dist/${{ matrix.output_name }}=/usr/bin/Netleaf"

    - name: Package for Linux (rpm)
      if: matrix.os == 'ubuntu-latest'
      run: |
        fpm -s dir -t rpm -n "Netleaf" -v "${{ env.APP_VERSION }}" "./dist/${{ matrix.output_name }}=/usr/bin/Netleaf"

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Netleaf-${{ matrix.os }}
        path: dist/*

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        tag_name: v${{ env.APP_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}